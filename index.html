<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Shop - Gestão de Atendimentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-shadow: none !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans p-4 md:p-8">

    <div class="max-w-7xl mx-auto bg-white border border-gray-300">
        
        <!-- Cabeçalho -->
        <header class="bg-gray-800 text-white p-4 border-b border-gray-300">
            <h1 class="text-2xl font-bold uppercase tracking-wider">Pet Shop FATEC-ZL</h1>
        </header>

        <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Formulário de Entrada -->
            <div class="md:col-span-1">
                <form id="formPet" onsubmit="cadastrarPet(event)" class="border border-gray-300 p-4 bg-gray-50">
                    <h3 class="font-bold mb-3 border-b border-gray-200 pb-1 text-gray-800">Nova Entrada</h3>
                    
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-semibold mb-1">Nome do Pet</label>
                            <input type="text" id="nomePet" required class="w-full border border-gray-300 p-2">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-sm font-semibold mb-1">Espécie</label>
                                <select id="especie" class="w-full border border-gray-300 p-2">
                                    <option value="Cachorro">Cachorro</option>
                                    <option value="Gato">Gato</option>
                                    <option value="Outro">Outro</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-1">Raça/Cor</label>
                                <input type="text" id="raca" class="w-full border border-gray-300 p-2">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-1">Nome do Dono</label>
                            <input type="text" id="nomeDono" required class="w-full border border-gray-300 p-2">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-1">Serviço</label>
                            <select id="servico" class="w-full border border-gray-300 p-2">
                                <option value="Banho">Banho</option>
                                <option value="Tosa">Tosa</option>
                                <option value="Banho e Tosa">Banho e Tosa</option>
                                <option value="Consulta Vet">Consulta Veterinária</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="mt-4 w-full bg-gray-800 text-white px-4 py-2 hover:bg-gray-700">
                        Registrar Pet
                    </button>
                </form>
            </div>

            <!-- Lista de Atendimentos -->
            <div class="md:col-span-2">
                <div class="border border-gray-300 bg-white">
                    <div class="bg-gray-100 p-3 border-b border-gray-300 flex justify-between items-center">
                        <h2 class="font-bold text-lg text-gray-700">Fila de Atendimentos</h2>
                        <button type="button" onclick="carregarPets()" class="text-sm bg-white border border-gray-400 px-3 py-1 hover:bg-gray-50">Atualizar Fila</button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-sm text-gray-600">
                                    <th class="border-b border-gray-200 p-3">Pet</th>
                                    <th class="border-b border-gray-200 p-3">Serviço</th>
                                    <th class="border-b border-gray-200 p-3">Dono</th>
                                    <th class="border-b border-gray-200 p-3">Status</th>
                                    <th class="border-b border-gray-200 p-3 text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaPets">
                                <tr><td colspan="5" class="p-6 text-center text-gray-500">Carregando dados...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/pets';

        // Estilização condicional baseada no status
        function getStatusColor(status) {
            if (status === 'Aguardando') return 'bg-red-100 text-red-800 border-red-300';
            if (status === 'Em Andamento') return 'bg-yellow-100 text-yellow-800 border-yellow-300';
            if (status === 'Concluído') return 'bg-green-100 text-green-800 border-green-300';
            return 'bg-gray-100 text-gray-800 border-gray-300';
        }

        // Ler / Listar
        async function carregarPets() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error('Servidor indisponível');
                const pets = await res.json();
                
                if (pets.length === 0) {
                    document.getElementById('tabelaPets').innerHTML = '<tr><td colspan="5" class="p-6 text-center text-gray-500 border-b border-gray-200">Nenhum pet na fila no momento.</td></tr>';
                    return;
                }

                const html = pets.map(pet => `
                    <tr class="hover:bg-gray-50 border-b border-gray-100">
                        <td class="p-3">
                            <div class="font-bold text-gray-800">${pet.nomePet}</div>
                            <div class="text-xs text-gray-500">${pet.especie} ${pet.raca ? '- ' + pet.raca : ''}</div>
                        </td>
                        <td class="p-3 text-sm">${pet.servico}</td>
                        <td class="p-3 text-sm">${pet.nomeDono}</td>
                        <td class="p-3">
                            <select onchange="atualizarStatus('${pet._id}', this.value)" class="text-xs border p-1 focus:outline-none ${getStatusColor(pet.status)} font-semibold">
                                <option value="Aguardando" ${pet.status === 'Aguardando' ? 'selected' : ''}>Aguardando</option>
                                <option value="Em Andamento" ${pet.status === 'Em Andamento' ? 'selected' : ''}>Em Andamento</option>
                                <option value="Concluído" ${pet.status === 'Concluído' ? 'selected' : ''}>Concluído</option>
                            </select>
                        </td>
                        <td class="p-3 text-center">
                            <button onclick="deletarPet('${pet._id}')" class="text-xs bg-white border border-red-400 text-red-600 px-2 py-1 hover:bg-red-50">
                                Dar Baixa
                            </button>
                        </td>
                    </tr>
                `).join('');
                
                document.getElementById('tabelaPets').innerHTML = html;
            } catch (err) {
                document.getElementById('tabelaPets').innerHTML = '<tr><td colspan="5" class="p-6 text-center text-red-600 border-b border-red-200 font-bold bg-red-50">Erro ao conectar com o servidor Node/MongoDB.</td></tr>';
            }
        }

        // Criar
        async function cadastrarPet(e) {
            e.preventDefault();
            const pet = {
                nomePet: document.getElementById('nomePet').value,
                especie: document.getElementById('especie').value,
                raca: document.getElementById('raca').value,
                nomeDono: document.getElementById('nomeDono').value,
                servico: document.getElementById('servico').value
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pet)
                });
                
                if (res.ok) {
                    document.getElementById('formPet').reset();
                    carregarPets();
                } else {
                    alert('Erro ao registrar o pet.');
                }
            } catch (err) {
                alert('Falha na comunicação com o servidor.');
            }
        }

        // Atualizar
        async function atualizarStatus(id, novoStatus) {
            try {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: novoStatus })
                });
                carregarPets(); // Recarrega para atualizar as cores
            } catch (err) {
                alert('Erro ao atualizar status.');
            }
        }

        // Deletar
        async function deletarPet(id) {
            if (!confirm('Confirmar a saída deste pet do sistema?')) return;
            
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                carregarPets();
            } catch (err) {
                alert('Erro ao dar baixa.');
            }
        }

        // Inicializar
        carregarPets();
    </script>
</body>
</html>
